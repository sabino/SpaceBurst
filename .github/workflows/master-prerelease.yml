name: Master Prerelease

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  windows-build:
    name: Windows Game Package
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore SpaceBurst.sln

      - name: Build solution
        run: dotnet build SpaceBurst.sln -c Release --no-restore -v minimal

      - name: Run runtime tests
        run: dotnet test SpaceBurst.Runtime.Tests/SpaceBurst.Runtime.Tests.csproj -c Release --no-build -v minimal

      - name: Publish Windows single-file build
        shell: pwsh
        run: >
          dotnet publish .\SpaceBurst\SpaceBurst.csproj
          -c Release
          -r win-x64
          -p:SelfContained=true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -p:Version=1.0.${{ github.run_number }}
          -p:InformationalVersion=${{ github.sha }}
          -o .\artifacts\ci\win-x64

      - name: Package Windows artifact
        shell: pwsh
        run: Compress-Archive -Path .\artifacts\ci\win-x64\* -DestinationPath .\artifacts\ci\SpaceBurst-win-x64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-game
          path: artifacts/ci/SpaceBurst-win-x64.zip

  linux-build:
    name: Linux Game Package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Linux single-file build
        run: >
          dotnet publish SpaceBurst/SpaceBurst.csproj
          -c Release
          -r linux-x64
          -p:SelfContained=true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -p:Version=1.0.${{ github.run_number }}
          -p:InformationalVersion=${{ github.sha }}
          -o artifacts/ci/linux-x64

      - name: Package Linux artifact
        run: tar -czf artifacts/ci/SpaceBurst-linux-x64.tar.gz -C artifacts/ci/linux-x64 .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-game
          path: artifacts/ci/SpaceBurst-linux-x64.tar.gz

  android-build:
    name: Android Signed APK
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install .NET Android workload
        run: dotnet workload install android

      - name: Validate Android signing secrets
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          $required = @(
            "ANDROID_KEYSTORE_BASE64",
            "ANDROID_KEYSTORE_PASSWORD",
            "ANDROID_KEY_ALIAS",
            "ANDROID_KEY_PASSWORD"
          )

          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item -Path "Env:$name").Value)) {
              throw "Missing required Android signing secret: $name"
            }
          }

      - name: Materialize signing keystore
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          $keystorePath = Join-Path $env:RUNNER_TEMP "spaceburst-release.keystore"
          [System.IO.File]::WriteAllBytes($keystorePath, [System.Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64))
          "KEYSTORE_PATH=$keystorePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build signed Android APK
        shell: pwsh
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: >
          .\build-android.ps1
          -Configuration Release
          -InstallDependencies
          -ApplicationVersion ${{ github.run_number }}
          -ApplicationDisplayVersion 1.0.${{ github.run_number }}
          -SigningKeyStorePath $env:KEYSTORE_PATH
          -SigningStorePass $env:ANDROID_KEYSTORE_PASSWORD
          -SigningKeyAlias $env:ANDROID_KEY_ALIAS
          -SigningKeyPass $env:ANDROID_KEY_PASSWORD

      - name: Copy Android artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts\ci\android | Out-Null
          $apk = Get-ChildItem .\SpaceBurst.Android\bin\Release\net8.0-android34.0 -Filter *.apk | Select-Object -First 1
          if (-not $apk) {
            throw "No Android APK found."
          }
          Copy-Item $apk.FullName .\artifacts\ci\android\SpaceBurst-android.apk -Force

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-game
          path: artifacts/ci/android/SpaceBurst-android.apk

  release:
    name: Publish Master Prerelease
    runs-on: ubuntu-latest
    needs:
      - windows-build
      - linux-build
      - android-build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/downloads

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p artifacts/release
          cp artifacts/downloads/windows-game/SpaceBurst-win-x64.zip artifacts/release/
          cp artifacts/downloads/linux-game/SpaceBurst-linux-x64.tar.gz artifacts/release/
          cp artifacts/downloads/android-game/SpaceBurst-android.apk artifacts/release/
          cp LICENSE artifacts/release/LICENSE.txt
          short_sha="${GITHUB_SHA::7}"
          {
            echo "SpaceBurst master prerelease"
            echo
            echo "Commit: ${GITHUB_SHA}"
            echo "Developer: Sabino Software"
            echo "Docs: https://sabino.github.io/SpaceBurst/"
            echo "License: The Unlicense"
            echo
            echo "Included assets:"
            echo "- SpaceBurst-win-x64.zip"
            echo "- SpaceBurst-linux-x64.tar.gz"
            echo "- SpaceBurst-android.apk"
          } > artifacts/release/RELEASE-NOTES.txt
          (cd artifacts/release && sha256sum SpaceBurst-win-x64.zip SpaceBurst-linux-x64.tar.gz SpaceBurst-android.apk LICENSE.txt RELEASE-NOTES.txt > SHA256SUMS.txt)
          echo "short_sha=${short_sha}" >> "$GITHUB_ENV"

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: master-${{ env.short_sha }}
          name: Master prerelease ${{ env.short_sha }}
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/release/SpaceBurst-win-x64.zip
            artifacts/release/SpaceBurst-linux-x64.tar.gz
            artifacts/release/SpaceBurst-android.apk
            artifacts/release/SHA256SUMS.txt
            artifacts/release/LICENSE.txt
            artifacts/release/RELEASE-NOTES.txt
